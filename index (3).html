<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CS2 Upgrader</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:
        radial-gradient(circle at top, rgba(138,43,226,0.25), transparent 40%),
        linear-gradient(135deg,#0d0b14,#181326);
    min-height: 100vh;
    overflow-x: hidden;
}

.cyber-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(160,32,240,.3);
    backdrop-filter: blur(10px);
    box-shadow:
        0 0 20px rgba(138,43,226,.15),
        inset 0 0 20px rgba(138,43,226,.05);
}

.glow {
    box-shadow:
        0 0 15px rgba(160,32,240,.6),
        0 0 40px rgba(160,32,240,.35);
}

.upgrade-btn {
    transition: all .25s ease;
}

.upgrade-btn:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 25px rgba(160,32,240,.8),
        0 0 60px rgba(160,32,240,.5);
}

.pointer {
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 32px solid #a020f0;
    filter: drop-shadow(0 0 10px #a020f0);
}

.result-popup {
    animation: pop .35s ease;
}

@keyframes pop {
    from {
        transform: scale(.8);
        opacity:0;
    }
    to {
        transform: scale(1);
        opacity:1;
    }
}
</style>
</head>
<body class="text-white font-sans">

<div class="max-w-7xl mx-auto p-6">

    <div class="text-center mb-10">
        <h1 class="text-5xl font-black tracking-wider">
            CS2 <span class="text-purple-400">UPGRADER</span>
        </h1>
        <p class="text-gray-400 mt-2">
            Upgrade your skins with a chance-based wheel.
        </p>
    </div>

    <div class="grid lg:grid-cols-3 gap-8 items-center">

        <!-- LEFT ITEM -->
        <div class="cyber-card rounded-3xl p-6">
            <h2 class="text-xl font-bold mb-4 text-purple-300">
                Your Item
            </h2>

            <img
                src="https://images.steamusercontent.com/ugc/948471825950169454/F95E1C9A6D0A05D4C1D7E75BFE8B47C4D4A69A90/"
                class="rounded-xl w-full h-48 object-cover"
            >

            <div class="mt-4">
                <div class="font-bold text-lg">
                    AK-47 | Neon Rider
                </div>

                <div class="text-purple-300 text-xl font-black mt-1">
                    $50
                </div>
            </div>
        </div>

        <!-- CENTER -->
        <div class="flex flex-col items-center">

            <div class="pointer mb-2"></div>

            <div class="relative">
                <canvas
                    id="wheel"
                    width="420"
                    height="420"
                    class="glow rounded-full"
                ></canvas>

                <div
                    class="absolute inset-0 flex items-center justify-center pointer-events-none"
                >
                    <div class="text-center">
                        <div
                            id="chanceText"
                            class="text-6xl font-black text-purple-300"
                        >
                            50%
                        </div>

                        <div class="text-gray-400">
                            Success Chance
                        </div>
                    </div>
                </div>
            
</div>

<div class="flex gap-2 justify-center mt-5 flex-wrap">
<button class="chancePreset px-4 py-2 rounded-xl bg-purple-700">25%</button>
<button class="chancePreset px-4 py-2 rounded-xl bg-purple-700">50%</button>
<button class="chancePreset px-4 py-2 rounded-xl bg-purple-700">75%</button>
</div>

<div class="flex gap-2 justify-center mt-3 flex-wrap">
<button class="multiplierPreset px-4 py-2 rounded-xl bg-fuchsia-700">1.5x</button>
<button class="multiplierPreset px-4 py-2 rounded-xl bg-fuchsia-700">2x</button>
<button class="multiplierPreset px-4 py-2 rounded-xl bg-fuchsia-700">5x</button>
<button class="multiplierPreset px-4 py-2 rounded-xl bg-fuchsia-700">10x</button>
</div>

<button
                id="upgradeBtn"
                class="upgrade-btn mt-8 px-10 py-4 rounded-2xl bg-purple-700 text-xl font-black tracking-wider glow"
            >
                UPGRADE
            </button>

            <div
                id="result"
                class="hidden result-popup mt-6 text-3xl font-black"
            ></div>
        </div>

        <!-- RIGHT ITEM -->
        <div class="cyber-card rounded-3xl p-6">
            <h2 class="text-xl font-bold mb-4 text-purple-300">
                Target Item
            </h2>

            <img
                src="https://images.steamusercontent.com/ugc/948471825950169400/4A8A31D36D53F52A33E48B79F4B6E6A8F6E9D1E7/"
                class="rounded-xl w-full h-48 object-cover"
            >

            <div class="mt-4">
                <div class="font-bold text-lg">
                    AWP | Dragon Lore
                </div>

                <div
                    id="targetPriceLabel"
                    class="text-purple-300 text-xl font-black mt-1"
                >
                    $100
                </div>
            </div>

            <div class="mt-5">
                <label class="text-sm text-gray-400">
                    Target Value
                </label>

                <input
                    id="targetValue"
                    type="range"
                    min="60"
                    max="500"
                    value="100"
                    class="w-full mt-2"
                >
            </div>
        </div>

    </div>
</div>


<audio id="tickSound" src="sounds/tick.mp3"></audio>
<audio id="winSound" src="sounds/win.mp3"></audio>
<audio id="loseSound" src="sounds/lose.mp3"></audio>
<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const itemValue = 50;

const targetSlider = document.getElementById("targetValue");
const targetPriceLabel = document.getElementById("targetPriceLabel");
const chanceText = document.getElementById("chanceText");

const resultEl = document.getElementById("result");
const upgradeBtn = document.getElementById("upgradeBtn");

let rotation = 0;
let chance = 50;
let previousSegment=-1;

function calculateChance() {
    const targetValue = Number(targetSlider.value);

    targetPriceLabel.textContent = `$${targetValue}`;

    chance = Math.min(
        95,
        Math.max(
            1,
            (itemValue / targetValue) * 100
        )
    );

    chanceText.textContent =
        Math.round(chance) + "%";

    drawWheel(rotation);
}

function drawWheel(angle) {

    const size = canvas.width;
    const center = size / 2;
    const radius = 180;

    ctx.clearRect(0,0,size,size);

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(angle);

    // Background ring
    ctx.beginPath();
    ctx.arc(
        0,
        0,
        radius,
        0,
        Math.PI * 2
    );

    ctx.lineWidth = 36;
    ctx.strokeStyle = "#242136";
    ctx.stroke();

    // Winning zone
    const winningAngle =
        (chance / 100) * Math.PI * 2;

    ctx.beginPath();
    ctx.arc(
        0,
        0,
        radius,
        -Math.PI/2,
        -Math.PI/2 + winningAngle
    );

    ctx.lineWidth = 36;

    const grad =
        ctx.createLinearGradient(
            -radius,
            0,
            radius,
            0
        );

    grad.addColorStop(0,"#8a2be2");
    grad.addColorStop(1,"#d946ef");

    ctx.strokeStyle = grad;
    ctx.shadowBlur = 25;
    ctx.shadowColor = "#a020f0";
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Tick marks
    for(let i=0;i<100;i++){

        const a =
            (Math.PI*2/100)*i;

        const inner =
            radius - 28;

        const outer =
            radius + 18;

        ctx.beginPath();

        ctx.moveTo(
            Math.cos(a)*inner,
            Math.sin(a)*inner
        );

        ctx.lineTo(
            Math.cos(a)*outer,
            Math.sin(a)*outer
        );

        ctx.strokeStyle =
            i%5===0
            ? "#a855f7"
            : "#4c3b69";

        ctx.lineWidth =
            i%5===0
            ? 3
            : 1;

        ctx.stroke();
    }

    ctx.restore();
}

calculateChance();

targetSlider.addEventListener(
    "input",
    calculateChance
);

function playTickSound(){
 const a=document.getElementById('tickSound');
 a.currentTime=0;
 a.play().catch(()=>{});
}
function playWinSound(){
 document.getElementById('winSound').play().catch(()=>{});
}
function playLoseSound(){
 document.getElementById('loseSound').play().catch(()=>{});
}

function spinWheel() {

    upgradeBtn.disabled = true;
    resultEl.classList.add("hidden");

    const randomAngle =
        Math.random() *
        Math.PI * 2;

    const extraSpins =
        8 * Math.PI * 2;

    const startRotation =
        rotation;

    const targetRotation =
        rotation +
        extraSpins +
        randomAngle;

    const duration = 4500;

    const start =
        performance.now();

    function animate(now){

        const elapsed =
            now - start;

        let progress =
            Math.min(
                elapsed / duration,
                1
            );

        const eased =
            1 -
            Math.pow(
                1-progress,
                4
            );

        rotation =
            startRotation +
            (targetRotation -
            startRotation)
            * eased;

        drawWheel(rotation);

        const segmentSize=(Math.PI*2)/100;
        const currentSegment=Math.floor((((rotation%(Math.PI*2))+Math.PI*2)%(Math.PI*2))/segmentSize);
        if(currentSegment!==previousSegment){
            previousSegment=currentSegment;
            playTickSound();
        }

        if(progress < 1){

            playTickSound();

            requestAnimationFrame(
                animate
            );

        } else {

            finishSpin();
        }
    }

    requestAnimationFrame(
        animate
    );
}

function finishSpin() {

    const normalized =
        (
            ((Math.PI*2) -
            (rotation %
            (Math.PI*2)))
            + Math.PI/2
        ) %
        (Math.PI*2);

    const winArc =
        (chance/100) *
        Math.PI*2;

    const won =
        normalized <= winArc;

    resultEl.classList.remove(
        "hidden"
    );

    if(won){

        resultEl.textContent =
            "🎉 WIN";

        resultEl.className =
            "result-popup mt-6 text-3xl font-black text-green-400";

        playWinSound();

    } else {

        resultEl.textContent =
            "❌ LOSS";

        resultEl.className =
            "result-popup mt-6 text-3xl font-black text-red-400";

        playLoseSound();
    }

    upgradeBtn.disabled = false;
}


document.querySelectorAll('.chancePreset').forEach((btn,i)=>{
 const vals=[25,50,75];
 btn.onclick=()=>{
   targetSlider.value=Math.round(itemValue/(vals[i]/100));
   calculateChance();
 };
});

document.querySelectorAll('.multiplierPreset').forEach((btn,i)=>{
 const vals=[1.5,2,5,10];
 btn.onclick=()=>{
   targetSlider.value=Math.round(itemValue*vals[i]);
   calculateChance();
 };
});

upgradeBtn.addEventListener(
    "click",
    spinWheel
);
</script>

</body>
</html>
